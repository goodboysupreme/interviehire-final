# Render blueprint for the IntervieHire backend + interview engine + Postgres.
# Deploy: Render Dashboard → New → Blueprint → pick this repo. Render reads this
# file, provisions the database, and prompts for the `sync: false` secrets.
#
# After deploy you get two service URLs:
#   - interviehire-backend  (FastAPI)  → recruiter/auth/jobs API
#   - interviehire-engine   (Fastify)  → interview sessions + transcript + report
# Point the Vercel front-ends at these (see DEPLOY.md).

databases:
  - name: interviehire-db
    plan: free
    databaseName: interviehire
    # Both services attach to this one Postgres (engine = Prisma tables,
    # backend = SQLAlchemy tables, same DB — matches local).

services:
  # ── FastAPI backend (recruiter dashboard API: auth, jobs, applicants) ──
  - type: web
    name: interviehire-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.5"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: interviehire-db
          property: connectionString
      # The dashboard's public origin (Vercel), used for CORS + auth cookie.
      # e.g. https://app.interviehire.com — paste when prompted.
      - key: FRONTEND_URL
        sync: false
      # Cross-site auth cookie (dashboard on Vercel ↔ backend on Render).
      - key: COOKIE_SAMESITE
        value: none
      - key: COOKIE_SECURE
        value: "true"
      # Candidate interview room — the emailed calendar invite links to the
      # site's /interview panel (must be where the candidate room is served).
      - key: INTERVIEW_ROOM_URL
        value: https://interviehire.com
      # Email for calendar invites (Gmail SMTP is free via an App Password).
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_FROM
        value: interviehire@gmail.com
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false

  # ── Fastify interview engine (sessions, transcript pipeline, LLM report) ──
  - type: web
    name: interviehire-engine
    runtime: node
    rootDir: interview-engine
    plan: free
    buildCommand: "npm install && npm run build -w packages/shared && npm run db:generate -w apps/api && npm run build -w apps/api"
    # Apply pending Prisma migrations on every deploy, then start the API.
    startCommand: "npx prisma migrate deploy --schema apps/api/prisma/schema.prisma && npm run start -w apps/api"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: interviehire-db
          property: connectionString
      # Avatar voice → Deepgram (webm-native). Candidate side is keyless browser STT.
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: DEEPGRAM_MODEL
        value: nova-2
      # LLM report via OpenRouter (DeepSeek client pointed at OpenRouter).
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek/deepseek-chat
      - key: DEEPSEEK_BASE_URL
        value: https://openrouter.ai/api/v1/chat/completions
